<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── COLORS ───
const C = { navy: "#003049", red: "#D62828", orange: "#F77F00", gold: "#FCBF49", bg: "#00243a", card: "#003a56", cardAlt: "#004466", text: "#F0E6D3", sub: "#8ab4c9", dim: "#4a7a8f", done: "#FCBF49" };

const DAYS = [
  { key:"push", day:"MON", title:"PUSH", sub:"Chest / Tri / Delts", icon:"💪", color:C.red,
    sections:[
      { label:"COMPOUND", exercises:[
        { id:"p1", name:"Incline DB Press", rx:"4 × 8-10", rest:"90s", rpe:"8-9", tempo:"3-1-1-0", note:"30° incline. Key upper chest builder.", q:"incline dumbbell press form" },
        { id:"p2", name:"Flat Barbell Bench", rx:"3 × 6-8", rest:"2 min", rpe:"8-9", tempo:"3-1-1-0", note:"Pinch shoulder blades, slight arch.", q:"barbell bench press form" },
        { id:"p3", name:"Weighted Dips", rx:"3 × 8-10", rest:"90s", rpe:"8", tempo:"2-1-1-0", note:"Lean forward for chest emphasis.", q:"weighted chest dips" },
      ]},
      { label:"ISOLATION", exercises:[
        { id:"p4", name:"Cable Flyes (low→high)", rx:"3 × 12-15", rest:"60s", rpe:"7-8", tempo:"2-1-2-0", note:"Squeeze at top. Upper chest.", q:"low to high cable fly" },
        { id:"p5", name:"OH Tricep Extension", rx:"3 × 12-15", rest:"60s", rpe:"7-8", tempo:"2-1-2-0", note:"Long head — horseshoe builder.", q:"cable overhead tricep extension" },
        { id:"p6", name:"Rope Pushdowns", rx:"3 × 12-15", rest:"60s", rpe:"7-8", tempo:"2-0-2-0", note:"Spread rope at bottom, squeeze.", q:"tricep rope pushdown" },
        { id:"p7", name:"Lateral Raises", rx:"3 × 15-20", rest:"45s", rpe:"7", tempo:"2-0-2-0", note:"Light weight, control the negative.", q:"dumbbell lateral raise" },
      ]},
    ]
  },
  { key:"pull", day:"TUE", title:"PULL", sub:"Back / Biceps / Rear Delts", icon:"🏋️", color:C.orange,
    sections:[
      { label:"COMPOUND", exercises:[
        { id:"pl1", name:"Weighted Pull-Ups", rx:"4 × 6-8", rest:"2 min", rpe:"8-9", tempo:"2-1-1-0", note:"Add weight via belt. Chin over bar.", q:"weighted pull ups" },
        { id:"pl2", name:"Barbell Bent-Over Row", rx:"4 × 8-10", rest:"90s", rpe:"8-9", tempo:"2-1-1-0", note:"45° torso. Pull to lower chest.", q:"barbell bent over row" },
        { id:"pl3", name:"Seated Cable Row", rx:"3 × 10-12", rest:"75s", rpe:"8", tempo:"2-1-2-0", note:"Close grip. Pause at chest.", q:"close grip seated cable row" },
      ]},
      { label:"ISOLATION", exercises:[
        { id:"pl4", name:"Face Pulls", rx:"3 × 15-20", rest:"45s", rpe:"7", tempo:"2-1-2-0", note:"External rotate at top.", q:"face pulls cable" },
        { id:"pl5", name:"Barbell Curl", rx:"3 × 8-10", rest:"60s", rpe:"8", tempo:"3-1-1-0", note:"Strict form. No swinging.", q:"barbell curl strict form" },
        { id:"pl6", name:"Hammer Curls", rx:"3 × 10-12", rest:"60s", rpe:"7-8", tempo:"2-1-1-0", note:"Brachialis — arm thickness.", q:"dumbbell hammer curl" },
        { id:"pl7", name:"Reverse Curls (EZ)", rx:"2 × 12-15", rest:"45s", rpe:"7", tempo:"2-0-2-0", note:"Forearm + pronation work.", q:"ez bar reverse curl" },
      ]},
    ]
  },
  { key:"legs", day:"WED", title:"LEGS", sub:"Quad / Ham / Glute", icon:"🦵", color:"#2a9d8f",
    sections:[
      { label:"COMPOUND", exercises:[
        { id:"l1", name:"Hack Squat", rx:"4 × 6-8", rest:"2-3 min", rpe:"8-9", tempo:"3-1-1-0", note:"Feet mid-platform. Below parallel. Ankle-friendly.", q:"hack squat machine form" },
        { id:"l2", name:"Romanian Deadlift", rx:"3 × 8-10", rest:"90s", rpe:"8-9", tempo:"3-1-1-0", note:"Hinge at hips. Feel hamstrings.", q:"romanian deadlift barbell" },
        { id:"l3", name:"Bulgarian Split Squat", rx:"3 × 10-12/leg", rest:"75s", rpe:"8", tempo:"2-1-1-0", note:"Rear foot elevated. Unilateral.", q:"bulgarian split squat" },
      ]},
      { label:"ISOLATION", exercises:[
        { id:"l4", name:"Leg Press", rx:"3 × 12-15", rest:"75s", rpe:"8", tempo:"3-0-1-0", note:"High/wide = glutes, low = quads.", q:"leg press machine" },
        { id:"l5", name:"Leg Curl", rx:"3 × 12-15", rest:"60s", rpe:"7-8", tempo:"2-1-2-0", note:"Squeeze at peak contraction.", q:"seated leg curl" },
        { id:"l6", name:"Standing Calf Raise", rx:"4 × 12-15", rest:"45s", rpe:"8", tempo:"2-2-2-0", note:"Slow eccentric — ankle mob.", q:"standing calf raise" },
        { id:"l7", name:"Goblet Squat Hold", rx:"2 × 30s", rest:"45s", rpe:"—", tempo:"Hold", note:"Deep squat. Hip + ankle mob.", q:"goblet squat hold mobility" },
      ]},
    ]
  },
  { key:"upper", day:"THU", title:"UPPER HYP", sub:"Pump — Chest & Arms", icon:"🔥", color:C.gold,
    sections:[
      { label:"SUPERSETS", exercises:[
        { id:"u1", name:"A1: Incline DB Flye", rx:"3 × 12-15", rest:"—", rpe:"7", tempo:"2-1-2-0", note:"Superset w/ A2. Deep stretch.", q:"incline dumbbell fly" },
        { id:"u2", name:"A2: DB Pullover", rx:"3 × 12-15", rest:"60s", rpe:"7", tempo:"3-1-1-0", note:"Chest + serratus. T-spine bonus.", q:"dumbbell pullover" },
        { id:"u3", name:"B1: Cable Crossover", rx:"3 × 15-20", rest:"—", rpe:"7", tempo:"2-0-2-0", note:"Superset w/ B2. Lower chest.", q:"high cable crossover" },
        { id:"u4", name:"B2: Straight-Arm Pulldown", rx:"3 × 12-15", rest:"60s", rpe:"7", tempo:"2-1-2-0", note:"Lats + core. Arms straight.", q:"straight arm lat pulldown" },
      ]},
      { label:"ARMS CIRCUIT", exercises:[
        { id:"u5", name:"C1: EZ Bar Curl", rx:"3 × 10-12", rest:"—", rpe:"8", tempo:"2-1-1-0", note:"Triset — C1→C2→C3, no rest.", q:"ez bar curl" },
        { id:"u6", name:"C2: Close-Grip Bench", rx:"3 × 10-12", rest:"—", rpe:"8", tempo:"2-1-1-0", note:"Shoulder width. Tricep mass.", q:"close grip bench press" },
        { id:"u7", name:"C3: Lateral Raise", rx:"3 × 15-20", rest:"90s", rpe:"7", tempo:"2-0-2-0", note:"Rest 90s after full round.", q:"dumbbell lateral raise" },
      ]},
      { label:"FINISHER", exercises:[
        { id:"u8", name:"100 Push-Ups", rx:"100 total", rest:"—", rpe:"—", tempo:"—", note:"Any variation. Clock it.", q:"push up variations" },
      ]},
    ]
  },
  { key:"cond", day:"FRI", title:"CONDITIONING", sub:"Cardio + Core + Carries", icon:"⚡", color:C.red,
    sections:[
      { label:"CARDIO (pick one)", exercises:[
        { id:"c1", name:"Assault Bike Intervals", rx:"10 × 30s", rest:"30s", rpe:"9", tempo:"—", note:"All-out sprints. Best fat-burner in the gym.", q:"assault bike intervals" },
        { id:"c1b", name:"Stairmaster Intervals", rx:"10 × 1 min", rest:"30s", rpe:"8-9", tempo:"—", note:"Alternate fast/moderate. Easy on ankles.", q:"stairmaster HIIT intervals" },
      ]},
      { label:"CARRIES & CORE", exercises:[
        { id:"c2", name:"Farmer Carries", rx:"4 × 40 yd", rest:"60s", rpe:"8", tempo:"—", note:"Heavy. Grip, core, traps.", q:"farmer carry exercise" },
        { id:"c3", name:"Heavy KB Swings", rx:"4 × 20", rest:"60s", rpe:"9", tempo:"—", note:"Hip hinge explosively. Squeeze glutes at top.", q:"kettlebell swing form" },
        { id:"c4", name:"Hanging Leg Raise", rx:"3 × 12-15", rest:"45s", rpe:"8", tempo:"2-1-2-0", note:"Straight legs. Control it.", q:"hanging leg raise" },
        { id:"c5", name:"Ab Wheel Rollout", rx:"3 × 10-12", rest:"45s", rpe:"8", tempo:"3-0-1-0", note:"From knees. Full extension.", q:"ab wheel rollout" },
        { id:"c6", name:"Pallof Press", rx:"3 × 12/side", rest:"45s", rpe:"7", tempo:"2-2-2-0", note:"Anti-rotation. Obliques.", q:"pallof press cable" },
      ]},
    ]
  },
  { key:"mobility", day:"DAILY", title:"MOBILITY", sub:"T-Spine / Hips / Ankles / Forearms", icon:"🧘", color:C.orange,
    sections:[
      { label:"T-SPINE", exercises:[
        { id:"m1", name:"Foam Roller Extensions", rx:"2 × 10", rest:"—", rpe:"—", tempo:"—", note:"Roller mid-back. Extend over.", q:"foam roller thoracic extension" },
        { id:"m2", name:"Open Books", rx:"2/side × 8", rest:"—", rpe:"—", tempo:"—", note:"Side-lying. Eyes follow hand.", q:"open book thoracic rotation" },
        { id:"m3", name:"Cat-Cow", rx:"2 × 10", rest:"—", rpe:"—", tempo:"—", note:"Exaggerate both positions.", q:"cat cow stretch" },
        { id:"m4", name:"Wall Slides", rx:"2 × 10", rest:"—", rpe:"—", tempo:"—", note:"Back flat. W→Y pattern.", q:"wall slide scapular exercise" },
      ]},
      { label:"HIPS", exercises:[
        { id:"m5", name:"90/90 Switches", rx:"2 × 8/side", rest:"—", rpe:"—", tempo:"—", note:"Sit tall. Control rotation.", q:"90 90 hip switch mobility" },
        { id:"m6", name:"Couch Stretch", rx:"2/side × 45s", rest:"—", rpe:"—", tempo:"—", note:"Knee against wall. Squeeze glute.", q:"couch stretch hip flexor" },
        { id:"m7", name:"Pigeon Pose", rx:"2/side × 45s", rest:"—", rpe:"—", tempo:"—", note:"Hips square. Walk hands fwd.", q:"pigeon pose stretch" },
      ]},
      { label:"ANKLES", exercises:[
        { id:"m8", name:"Banded Dorsiflexion", rx:"2/side × 15", rest:"—", rpe:"—", tempo:"—", note:"Band at ankle. Knee over toe.", q:"banded ankle dorsiflexion" },
        { id:"m9", name:"SL Calf Raise (slow)", rx:"2/side × 12", rest:"—", rpe:"—", tempo:"—", note:"3s up, 3s down.", q:"single leg calf raise slow eccentric" },
        { id:"m10", name:"Ankle CARs", rx:"2/side × 8 ea", rest:"—", rpe:"—", tempo:"—", note:"Max range. Slow circles.", q:"ankle CARs rotation" },
      ]},
      { label:"FOREARMS", exercises:[
        { id:"m11", name:"DB Pronation/Supination", rx:"2/side × 15", rest:"—", rpe:"—", tempo:"—", note:"Hold DB at end. Rotate slow.", q:"dumbbell forearm pronation supination" },
        { id:"m12", name:"Wrist CARs", rx:"2/side × 8 ea", rest:"—", rpe:"—", tempo:"—", note:"Max range circles both ways.", q:"wrist CARs mobility" },
        { id:"m13", name:"Banded Rotations", rx:"2/side × 12", rest:"—", rpe:"—", tempo:"—", note:"Pronate against band.", q:"banded forearm pronation" },
      ]},
    ]
  },
];

const ALL_EX_IDS = []; DAYS.filter(d=>d.key!=="mobility").forEach(d=>d.sections.forEach(s=>s.exercises.forEach(e=>ALL_EX_IDS.push(e.id))));
const TOTAL_EX = ALL_EX_IDS.length;
const STORAGE_KEY = "cut12wk-data";

function getDayExIds(k){const d=DAYS.find(x=>x.key===k);const ids=[];if(d)d.sections.forEach(s=>s.exercises.forEach(e=>ids.push(e.id)));return ids;}
function ytUrl(q){return"https://www.youtube.com/results?search_query="+encodeURIComponent(q+" form demo");}
function loadData(){
  try{
    const r=localStorage.getItem(STORAGE_KEY);
    if(r){const p=JSON.parse(r);return p;}
  }catch(e){}
  return null;
}
function saveData(d){
  try{
    const s=JSON.stringify(d);
    localStorage.setItem(STORAGE_KEY,s);
    // Verify: read it back immediately
    const check=localStorage.getItem(STORAGE_KEY);
    return check===s;
  }catch(e){return false;}
}

function App(){
  const saved=useRef(loadData());
  const savedExCount=useRef(saved.current?Object.values(saved.current.weeks||{}).reduce((a,w)=>a+Object.keys(w).length,0):0);
  const savedWeightCount=useRef(saved.current?Object.keys(saved.current.weights||{}).filter(k=>saved.current.weights[k]).length:0);
  const[allWeeks,setAllWeeks]=useState(saved.current?.weeks||{});
  const[currentWeek,setCurrentWeek]=useState(saved.current?.currentWeek||1);
  const[weightInputs,setWeightInputs]=useState(saved.current?.weights||{});
  const[expanded,setExpanded]=useState({});
  const[flash,setFlash]=useState(null);
  const[dayComplete,setDayComplete]=useState(null);
  const[view,setView]=useState("workout");
  const[foodTab,setFoodTab]=useState("meals");
  const[saveStatus,setSaveStatus]=useState(saved.current?("✓ Loaded: "+savedExCount.current+" exercises, "+savedWeightCount.current+" weigh-ins"):"New session — no saved data found");
  const timer=useRef(null);

  useEffect(()=>{setTimeout(()=>setSaveStatus(""),4000);},[]);

  const persist=(w,wt,wk)=>{
    if(timer.current)clearTimeout(timer.current);
    timer.current=setTimeout(()=>{
      const ok=saveData({weeks:w,weights:wt,currentWeek:wk});
      setSaveStatus(ok?"✓ Auto-saved":"⚠ Save failed");setTimeout(()=>setSaveStatus(""),2000);
    },300);
  };

  const forceSave=()=>{
    if(timer.current)clearTimeout(timer.current);
    const ok=saveData({weeks:allWeeks,weights:weightInputs,currentWeek});
    const exCount=Object.values(allWeeks).reduce((a,w)=>a+Object.keys(w).length,0);
    const wtCount=Object.keys(weightInputs).filter(k=>weightInputs[k]).length;
    setSaveStatus(ok?("✓ SAVED: "+exCount+" exercises, "+wtCount+" weigh-ins"):"⚠ SAVE FAILED");
    setTimeout(()=>setSaveStatus(""),3000);
  };

  const getDone=(wk)=>allWeeks[wk]||{};
  const done=getDone(currentWeek);

  const toggle=(id,dayKey)=>{
    const wd={...done};
    if(wd[id])delete wd[id];
    else{wd[id]=true;setFlash(id);setTimeout(()=>setFlash(null),600);
      const di=getDayExIds(dayKey);if(di.every(e=>e===id||wd[e])){setDayComplete(dayKey);setTimeout(()=>setDayComplete(null),2200);}
    }
    const nw={...allWeeks,[currentWeek]:wd};setAllWeeks(nw);persist(nw,weightInputs,currentWeek);
  };

  const updateWeight=(wk,val)=>{const nw={...weightInputs,[wk]:val};setWeightInputs(nw);persist(allWeeks,nw,currentWeek);};
  const switchWeek=(wk)=>{setCurrentWeek(wk);setExpanded({});persist(allWeeks,weightInputs,wk);};
  const weekPct=(wk)=>{const d=getDone(wk);return Math.round((Object.keys(d).length/TOTAL_EX)*100);};

  const curPct=weekPct(currentWeek);
  const curDone=Object.keys(done).length;
  const targetWeight=200-(currentWeek*1.25);

  const Logo=()=>(
    <svg viewBox="0 0 120 120" style={{width:36,height:36}}>
      <rect width="120" height="120" rx="24" fill={C.navy}/>
      <text x="60" y="52" textAnchor="middle" fontFamily="Arial Black,Arial,sans-serif" fontWeight="900" fontSize="38" fill={C.gold} letterSpacing="-2">CUT</text>
      <text x="60" y="92" textAnchor="middle" fontFamily="Arial Black,Arial,sans-serif" fontWeight="900" fontSize="48" fill={C.orange} letterSpacing="-1">12</text>
      <rect x="15" y="56" width="90" height="4" rx="2" fill={C.red}/>
    </svg>
  );

  return(
    <div className="shell">
      <div className="app-wrap" style={{background:C.bg,minHeight:"100vh"}}>

        {dayComplete&&(
          <div style={{position:"fixed",top:0,left:0,right:0,zIndex:200,background:`linear-gradient(135deg,${C.orange},${C.gold})`,padding:"14px 20px",textAlign:"center",animation:"completeBanner 2.2s ease forwards"}}>
            <div style={{fontSize:24}}>🎉</div>
            <div style={{fontSize:16,fontWeight:800,color:C.navy}}>{DAYS.find(d=>d.key===dayComplete)?.title} COMPLETE</div>
            <div style={{fontSize:11,color:"#003049aa"}}>Crushed it.</div>
          </div>
        )}

        {/* HEADER */}
        <div style={{background:`linear-gradient(135deg,${C.navy},#004060)`,padding:"14px 16px 12px",borderBottom:`2px solid ${C.orange}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <Logo/>
              <div>
                <div style={{fontSize:16,fontWeight:800,letterSpacing:1,color:C.gold}}>CUT12</div>
                <div style={{fontSize:10,color:C.dim}}>200 → 185 lbs</div>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              {saveStatus&&<span style={{fontSize:10,fontWeight:700,color:saveStatus.includes("✓")?C.gold:C.red,background:saveStatus.includes("✓")?"rgba(252,191,73,0.15)":"rgba(214,40,40,0.15)",padding:"4px 10px",borderRadius:6}}>{saveStatus.includes("✓")?"Saved ✓":"Save ⚠"}</span>}
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:10,color:C.dim}}>Overall</div>
                <div style={{fontSize:14,fontWeight:800,color:C.orange}}>{Math.round(Array.from({length:12},(_,i)=>weekPct(i+1)).reduce((a,b)=>a+b,0)/12)}%</div>
              </div>
            </div>
          </div>
        </div>

        {/* WEEK SELECTOR */}
        <div style={{padding:"10px 0 6px",borderBottom:"1px solid #0a4060",background:"#002a42"}}>
          <div style={{overflowX:"auto",display:"flex",gap:6,padding:"0 12px"}}>
            {Array.from({length:12},(_,i)=>i+1).map(wk=>{
              const pct=weekPct(wk);const isCur=wk===currentWeek;const comp=pct===100;
              return(<button key={wk} onClick={()=>switchWeek(wk)} style={{flexShrink:0,width:52,padding:"6px 0",borderRadius:10,border:isCur?`2px solid ${C.orange}`:"2px solid transparent",cursor:"pointer",fontFamily:"inherit",textAlign:"center",background:isCur?C.navy:comp?"rgba(252,191,73,0.1)":"#003a56",transition:"all 0.15s"}}>
                <div style={{fontSize:9,fontWeight:700,color:isCur?C.gold:C.dim,letterSpacing:0.5}}>WK {wk}</div>
                <div style={{fontSize:12,fontWeight:800,color:isCur?C.orange:comp?C.gold:"#5a8a9f",marginTop:1}}>{comp?"✓":pct>0?pct+"%":"—"}</div>
              </button>);
            })}
          </div>
        </div>

        {/* WEEK HEADER */}
        <div style={{padding:"12px 16px 8px",background:"#002035"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <span style={{fontSize:18,fontWeight:800,color:C.text}}>Week {currentWeek}</span>
              <span style={{fontSize:12,color:C.dim,marginLeft:8}}>Target: ~{targetWeight.toFixed(0)} lbs</span>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:22,fontWeight:800,color:curPct===100?C.gold:C.text}}>{curPct}%</div>
              <div style={{fontSize:10,color:C.dim}}>{curDone}/{TOTAL_EX}</div>
            </div>
          </div>
          <div style={{background:"#0a4060",borderRadius:6,height:6,marginTop:8,overflow:"hidden"}}>
            <div style={{height:"100%",borderRadius:6,width:curPct+"%",background:curPct===100?C.gold:`linear-gradient(90deg,${C.red},${C.orange})`,transition:"width 0.4s"}}/>

                    <div style={{fontSize:12,fontWeight:800,color:isCur?C.orange:C.sub,width:36}}>WK {wk}</div>
                    <div style={{flex:1}}><div style={{background:"#0a4060",borderRadius:3,height:6,overflow:"hidden"}}><div style={{height:"100%",borderRadius:3,width:pct+"%",background:pct===100?C.gold:pct>0?C.orange:"transparent",transition:"width 0.3s"}}/></div></div>
                    <div style={{fontSize:11,fontWeight:700,color:pct===100?C.gold:pct>0?C.orange:C.dim,width:34,textAlign:"right"}}>{pct}%</div>
                    <div style={{fontSize:11,color:C.dim,width:42,textAlign:"right"}}>{w?w+"lb":"—"}</div>
                  </div>
                );
              })}
              <div style={{marginTop:16,background:C.card,borderRadius:12,padding:14}}>
                <div style={{fontSize:11,fontWeight:700,color:C.gold,marginBottom:8}}>STATS</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {[
                    {v:Array.from({length:12},(_,i)=>weekPct(i+1)===100?1:0).reduce((a,b)=>a+b,0),l:"Perfect Weeks",c:C.gold},
                    {v:Object.values(allWeeks).reduce((a,wk)=>a+Object.keys(wk).length,0),l:"Total Exercises",c:C.orange},
                    {v:(()=>{const vals=Array.from({length:12},(_,i)=>parseFloat(weightInputs[i+1])).filter(v=>!isNaN(v));if(vals.length<2)return"—";return(vals[0]-vals[vals.length-1]).toFixed(1);})(),l:"Lbs Lost",c:C.red},
                    {v:Math.round(Array.from({length:12},(_,i)=>weekPct(i+1)).reduce((a,b)=>a+b,0)/12)+"%",l:"Avg Completion",c:"#2a9d8f"},
                  ].map((s,i)=>(
                    <div key={i} style={{textAlign:"center"}}>
                      <div style={{fontSize:22,fontWeight:800,color:s.c}}>{s.v}</div>
                      <div style={{fontSize:9,color:C.dim}}>{s.l}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
